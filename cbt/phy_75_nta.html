<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eduniti, NTA 75Q Part 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        * { font-family: 'DM Sans', sans-serif; }
        code, .mono { font-family: 'DM Mono', monospace; }

        /* ── CSS Variables ── */
        :root {
            --bg:        #f5f4f0;
            --surface:   #ffffff;
            --surface2:  #f0efe9;
            --border:    #e2e0d8;
            --text:      #1a1917;
            --text-muted:#6b6965;
            --accent:    #2563eb;
            --accent-fg: #ffffff;
        }
        .dark {
            --bg:        #111110;
            --surface:   #1c1c1a;
            --surface2:  #242422;
            --border:    #2e2e2b;
            --text:      #f0ede8;
            --text-muted:#8a8780;
            --accent:    #3b82f6;
            --accent-fg: #ffffff;
            color-scheme: dark;
        }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        #app-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        /* ── Sections ── */
        #question-section { background: var(--surface); }
        #sidebar { background: var(--surface); border-left: 1px solid var(--border); }

        /* ── Q-bar ── */
        #q-bar {
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        /* ── Footer bar ── */
        #footer-bar {
            background: var(--surface2);
            border-top: 1px solid var(--border);
        }

        /* ── Sidebar header ── */
        #palette-header {
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }
        #filter-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        #palette-footer {
            background: var(--surface2);
            border-top: 1px solid var(--border);
        }

        /* ── Select ── */
        select {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }
        select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

        /* ── Palette buttons ── */
        .palette-btn {
            width: 40px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700;
            border-radius: 6px;
            border: 1.5px solid var(--border);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            color: var(--text);
        }
        .palette-btn.active {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
            transform: scale(1.08);
        }
        .status-0 { background: var(--surface2); }
        .status-1 { background: #ef4444; color: #fff; border-color: #ef4444; }
        .status-2 { background: #22c55e; color: #fff; border-color: #22c55e; }
        .status-3 { background: #8b5cf6; color: #fff; border-color: #8b5cf6; }
        .status-4 { background: #8b5cf6; color: #fff; border-color: #8b5cf6; position: relative; }
        .status-4::after {
            content: '';
            position: absolute; bottom: 3px; right: 3px;
            width: 6px; height: 6px;
            background: #22c55e;
            border-radius: 50%;
        }

        /* ── Nav buttons ── */
        .btn {
            padding: 9px 18px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13.5px;
            transition: all 0.15s;
            border: 1.5px solid transparent;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--accent);
            color: var(--accent-fg);
            border-color: var(--accent);
        }
        .btn-primary:hover { filter: brightness(1.12); }
        .btn-ghost {
            background: transparent;
            color: var(--text);
            border-color: var(--border);
        }
        .btn-ghost:hover { background: var(--surface2); }
        .btn-mark {
            background: transparent;
            color: #8b5cf6;
            border-color: #8b5cf6;
        }
        .btn-mark:hover { background: #8b5cf620; }
        .btn-danger {
            background: #111110;
            color: #f0ede8;
            border-color: #111110;
        }
        .dark .btn-danger {
            background: var(--accent);
            color: var(--accent-fg);
            border-color: var(--accent);
        }
        .btn-danger:hover { filter: brightness(1.15); }

        /* ── Option cards ── */
        .option-card {
            display: flex; align-items: center;
            padding: 14px 18px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            background: var(--surface);
            color: var(--text);
            gap: 14px;
        }
        .option-card:hover { border-color: var(--accent); background: var(--surface2); }
        .option-card.selected { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, var(--surface)); }
        .radio-dot {
            width: 20px; height: 20px; min-width: 20px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.15s;
        }
        .option-card.selected .radio-dot { border-color: var(--accent); background: var(--accent); }
        .radio-inner { width: 8px; height: 8px; border-radius: 50%; background: white; display: none; }
        .option-card.selected .radio-inner { display: block; }

        /* ── Integer input ── */
        .integer-input {
            background: var(--surface);
            color: var(--text);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'DM Mono', monospace;
            width: 100%;
            transition: border-color 0.15s;
        }
        .integer-input:focus { outline: none; border-color: var(--accent); }

        /* ── Timer ── */
        #question-timer {
            font-family: 'DM Mono', monospace;
            color: var(--accent);
            font-weight: 700;
        }

        /* ── Theme toggle ── */
        #dark-mode-toggle {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px;
            cursor: pointer;
            color: var(--text-muted);
            transition: background 0.2s;
        }
        #dark-mode-toggle:hover { background: var(--border); }

        /* ── Avatar ── */
        .avatar {
            background: color-mix(in srgb, var(--accent) 15%, var(--surface));
            color: var(--accent);
        }

        /* ── Question image (clickable) ── */
        #question-image {
            cursor: zoom-in;
            transition: box-shadow 0.2s;
        }
        #question-image:hover {
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        }

        /* ── Fullscreen lightbox ── */
        #lightbox {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
            backdrop-filter: blur(4px);
        }
        #lightbox.open { display: flex; }
        #lightbox img {
            max-width: 95vw;
            max-height: 95vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.7);
            pointer-events: none;
        }
        #lightbox-close {
            position: absolute; top: 20px; right: 24px;
            color: #fff; font-size: 28px; font-weight: 300;
            cursor: pointer; line-height: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 50%; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        #lightbox-close:hover { background: rgba(255,255,255,0.2); }

        /* ── Results overlay ── */
        #results-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 150;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            backdrop-filter: blur(6px);
        }
        #results-overlay.open { display: flex; }
        #results-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            max-width: 960px;
            width: 100%;
            max-height: 88vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #results-header {
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .stat-card {
            padding: 20px 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface2);
        }
        .stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 4px; }
        .result-table thead { background: var(--surface2); }
        .result-table th, .result-table td { padding: 14px 18px; border-bottom: 1px solid var(--border); }
        .result-table th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
        .result-table tbody tr:hover { background: var(--surface2); }
        .close-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 8px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            transition: background 0.15s;
        }
        .close-btn:hover { background: var(--surface2); color: var(--text); }

        /* ── Legend dots ── */
        .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header id="app-header" class="px-5 py-3 flex justify-between items-center z-10">
    <div class="flex items-center gap-4">
        <div style="font-size:15px;font-weight:800;letter-spacing:-0.3px;color:var(--accent)">eduniti</div>
        <div style="width:1px;height:18px;background:var(--border)"></div>
        <div style="font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:0.04em">NTA 75Q · PART 2 · PHYSICS</div>
    </div>
    <div class="flex items-center gap-3">
        <button id="dark-mode-toggle" title="Toggle theme">
            <svg id="sun-icon" class="w-4 h-4 hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
            <svg id="moon-icon" class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
        </button>
        <div style="width:1px;height:28px;background:var(--border)"></div>
        <div class="flex items-center gap-2">
            <div class="avatar w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm" style="font-size:11px">JD</div>
            <div class="hidden sm:block">
                <div style="font-size:13px;font-weight:700;color:var(--text)">John Doe</div>
                <div style="font-size:11px;color:var(--text-muted)">Roll: 696420</div>
            </div>
        </div>
    </div>
</header>

<!-- ══ MAIN ══ -->
<main class="flex-1 flex overflow-hidden">

    <!-- Question Panel -->
    <section id="question-section" class="flex-1 flex flex-col overflow-hidden">

        <!-- Q-bar -->
        <div id="q-bar" class="px-5 py-3 flex justify-between items-center">
            <h2 id="question-number-title" style="font-size:14px;font-weight:700;color:var(--text)">Question 1</h2>
            <div class="flex items-center gap-3" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 14px">
                <span style="font-size:10px;font-weight:700;letter-spacing:0.06em;color:var(--text-muted)">TIME</span>
                <span id="question-timer" style="font-size:16px">00:00</span>
            </div>
        </div>

        <!-- Content -->
        <div class="flex-1 overflow-y-auto p-5" style="gap:20px;display:flex;flex-direction:column">

            <!-- Image (primary, large) -->
            <div id="question-image-container" class="hidden">
                <img id="question-image"
                     src="" alt="Question"
                     style="width:100%;max-height:58vh;object-fit:contain;border-radius:10px;border:1px solid var(--border);background:var(--surface)"
                     title="Click to zoom">
            </div>

            <!-- Text (only when no image) -->
            <div id="question-text" style="font-size:17px;line-height:1.7;font-weight:500;color:var(--text)"></div>

            <!-- Options -->
            <div id="options-container" class="grid grid-cols-1 gap-3" style="padding-bottom:8px"></div>
        </div>

        <!-- Footer actions -->
        <div id="footer-bar" class="px-5 py-4 flex flex-wrap gap-3 items-center">
            <button id="mark-review-btn" class="btn btn-mark">☆ Mark & Next</button>
            <button id="clear-response-btn" class="btn btn-ghost">✕ Clear</button>
            <div class="flex-1"></div>
            <button id="check-answer-btn" class="btn btn-ghost" style="display:none; color:var(--accent); border-color:var(--accent)">👁 Check Answer</button>
            <button id="save-next-btn" class="btn btn-primary">Save &amp; Next →</button>
        </div>
    </section>

    <!-- ══ SIDEBAR ══ -->
    <aside id="sidebar" class="flex flex-col" style="width:288px;flex-shrink:0">

        <div id="palette-header" class="px-5 py-3">
            <div style="font-size:10px;font-weight:800;letter-spacing:0.1em;color:var(--text-muted);text-transform:uppercase">Question Palette</div>
        </div>

        <div id="filter-bar" class="px-4 py-3">
            <label style="font-size:10px;font-weight:700;letter-spacing:0.06em;color:var(--text-muted);text-transform:uppercase;display:block;margin-bottom:6px">Filter Topic</label>
            <select id="topic-filter" class="w-full rounded-lg px-3 py-2 text-sm font-semibold" style="color:var(--text)">
                <option value="All">All Topics</option>
            </select>
        </div>

        <div class="flex-1 overflow-y-auto px-4 py-4">
            <div id="palette-grid" class="grid gap-2" style="grid-template-columns:repeat(5,1fr)"></div>
        </div>

        <div id="palette-footer" class="px-4 py-4" style="display:flex;flex-direction:column;gap:16px">
            <!-- Legend -->
            <div class="grid grid-cols-2 gap-x-4 gap-y-2">
                <div class="flex items-center gap-2">
                    <span class="legend-dot" style="background:var(--surface2);border:1.5px solid var(--border)"></span>
                    <span style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase">Not Visited</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="legend-dot" style="background:#ef4444"></span>
                    <span style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase">Not Answered</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="legend-dot" style="background:#22c55e"></span>
                    <span style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase">Answered</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="legend-dot" style="background:#8b5cf6"></span>
                    <span style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase">For Review</span>
                </div>
            </div>

            <button id="submit-test-btn" class="btn btn-danger w-full" style="padding:13px;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;font-weight:800">
                Submit Test
            </button>
        </div>
    </aside>
</main>

<!-- ══ LIGHTBOX ══ -->
<div id="lightbox">
    <span id="lightbox-close" title="Close">×</span>
    <img id="lightbox-img" src="" alt="Question fullscreen">
</div>

<!-- ══ RESULTS ══ -->
<div id="results-overlay">
    <div id="results-panel">
        <div id="results-header">
            <div>
                <div style="font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px">eduniti · Physics</div>
                <div style="font-size:22px;font-weight:800;color:var(--text)">Exam Analysis</div>
            </div>
            <button class="close-btn" onclick="document.getElementById('results-overlay').classList.remove('open')">×</button>
        </div>

        <div class="flex-1 overflow-y-auto" style="padding:28px 32px">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="stat-card">
                    <div class="stat-label">Score</div>
                    <div id="result-score" style="font-size:36px;font-weight:800;color:var(--accent)">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Correct</div>
                    <div id="result-correct" style="font-size:36px;font-weight:800;color:#22c55e">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Incorrect</div>
                    <div id="result-incorrect" style="font-size:36px;font-weight:800;color:#ef4444">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Accuracy</div>
                    <div id="result-accuracy" style="font-size:36px;font-weight:800;color:var(--text)">0%</div>
                </div>
            </div>

            <div style="border:1px solid var(--border);border-radius:12px;overflow:hidden">
                <table class="result-table w-full text-left" style="border-collapse:collapse">
                    <thead>
                        <tr>
                            <th>Q</th>
                            <th>Status</th>
                            <th>Your Ans</th>
                            <th>Correct</th>
                            <th>Marks</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="analysis-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>window.baseImagePath = 'assets/diagrams_nta75/';</script>
<script src="data_nta75.js"></script>
<script src="script.js"></script>
</body>
</html>
