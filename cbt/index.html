<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }
        :root {
            --bg: #f0efe9; --surface: #fff; --surface2: #e8e7e0;
            --border: #dddbd2; --text: #1a1917; --text-muted: #706d68; --accent: #2563eb;
        }
        .dark {
            --bg: #111110; --surface: #1c1c1a; --surface2: #242422;
            --border: #2e2e2b; --text: #f0ede8; --text-muted: #8a8780; --accent: #3b82f6;
        }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }

        .top-bar {
            position: fixed; top: 0; right: 0; padding: 14px 20px;
        }
        .theme-btn {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 6px 10px; cursor: pointer;
            font-size: 15px; line-height: 1; transition: background 0.15s;
        }
        .theme-btn:hover { background: var(--surface2); }

        .heading {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.12em; color: var(--text-muted); margin-bottom: 24px;
            text-align: center;
        }

        .cards { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; max-width: 900px; }

        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; overflow: hidden; width: 280px;
            text-decoration: none; color: inherit; display: block;
            transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 40px rgba(0,0,0,0.12);
            border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
        }
        .dark .card:hover { box-shadow: 0 14px 40px rgba(0,0,0,0.5); }

        .card-strip { height: 4px; background: linear-gradient(90deg, #2563eb, #6366f1); }

        .card-body { padding: 20px; }
        .badge {
            display: inline-block; font-size: 10px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.09em;
            color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, var(--surface));
            border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--surface));
            padding: 3px 9px; border-radius: 100px; margin-bottom: 10px;
        }
        .card-title { font-size: 15px; font-weight: 800; letter-spacing: -0.2px; margin-bottom: 3px; line-height: 1.35; }
        .card-sub { font-size: 11px; color: var(--text-muted); margin-bottom: 16px; }
        .card-meta { display: flex; gap: 12px; font-size: 11px; color: var(--text-muted); margin-bottom: 16px; }
        .card-meta strong { color: var(--text); font-weight: 700; }
        .card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 14px; border-top: 1px solid var(--border); }
        .diff { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 9px; border-radius: 100px; color: #ef4444; background: color-mix(in srgb, #ef4444 10%, var(--surface)); border: 1px solid color-mix(in srgb, #ef4444 22%, var(--surface)); }
        .go-btn { display: inline-flex; align-items: center; gap: 4px; padding: 7px 14px; background: var(--accent); color: #fff; border-radius: 7px; font-size: 12px; font-weight: 700; transition: filter 0.15s; }
        .go-btn:hover { filter: brightness(1.12); }
    </style>
</head>
<body>
    <div class="top-bar">
        <button class="theme-btn" id="theme-toggle">🌙</button>
    </div>

    <p class="heading">Select a test</p>

    <div class="cards">
        <a class="card" href="phy_111.html">
            <div class="card-strip"></div>
            <div class="card-body">
                <div class="badge">⚛ Physics</div>
                <div class="card-title">eduniti Top 111 Qs</div>
                <div class="card-sub">Jan 2026 · JEE Main</div>
                <div class="card-meta">
                    <span><strong>111</strong> questions</span>
                    <span><strong>444</strong> marks</span>
                    <span><strong>+4 / −1</strong></span>
                </div>
                <div class="card-footer">
                    <span class="diff">2026</span>
                    <span class="go-btn">Start →</span>
                </div>
            </div>
        </a>
    </div>

    <script>
        const btn = document.getElementById('theme-toggle');
        const html = document.documentElement;
        const saved = localStorage.getItem('theme');
        if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark'); btn.textContent = '☀️';
        }
        btn.onclick = () => {
            html.classList.toggle('dark');
            const dark = html.classList.contains('dark');
            btn.textContent = dark ? '☀️' : '🌙';
            localStorage.setItem('theme', dark ? 'dark' : 'light');
        };
    </script>
</body>
</html>
